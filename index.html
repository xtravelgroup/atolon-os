<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atolon OS — Beach Club Management</title>
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#0D1B3E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atolon OS" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      /* Android/iOS fix: 100% height chain so AtolanOS can use height:100% instead of 100vh */
      html { height: 100%; overflow-x: hidden; max-width: 100%; }
      body { height: 100%; overflow-x: hidden; max-width: 100%; font-family: 'Lato', sans-serif; background: #0D1B3E; color: #fff; -webkit-font-smoothing: antialiased; }
      #root { height: 100%; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Barlow Condensed', sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0D1B3E; }
      ::-webkit-scrollbar-thumb { background: #1E3566; border-radius: 3px; }
      input, select, textarea, button { font-family: 'Lato', sans-serif; }
      /* Date input: white calendar icon for dark theme */
      input[type="date"] { color-scheme: dark; position: relative; }
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1) brightness(2);
        cursor: pointer;
        opacity: 1;
        padding: 4px;
      }
      /* Firefox */
      input[type="date"]::-moz-calendar-picker-indicator { filter: invert(1); }
      /* Ensure placeholder text is visible */
      input[type="date"]::-webkit-datetime-edit { color: #fff; }
      input[type="date"]::-webkit-datetime-edit-fields-wrapper { color: #fff; }
      /* Ocultar flechas spinner en inputs numéricos — toda la app */
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none !important; appearance: none !important; margin: 0 !important; display: none !important; }
      input[type="number"] { -moz-appearance: textfield !important; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Android/iOS: use dvh where supported, fallback to --vh JS variable */
      .atolon-app { height: 100dvh; height: calc(var(--vh, 1dvh) * 100); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Desinstalar service worker antiguo (PWA desactivada durante desarrollo)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }

      // Android/iOS viewport height fix — sets --vh CSS variable to true visual viewport height.
      // Needed because 100vh on Android Chrome includes the address bar height.
      // dvh units handle this natively on Chrome 108+, this polyfill covers older devices.
      (function() {
        function setVH() {
          var vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setVH);
        }
      })();

      // Abrir picker al hacer click en cualquier parte del input de fecha
      document.addEventListener("click", function(e) {
        if (e.target.type === "date") {
          try { e.target.showPicker(); } catch(_) {}
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
